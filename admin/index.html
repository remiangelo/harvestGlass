<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Harvest — Moderation</title>
  <style>
    :root {
      --bg: #1a0c12; --card: #271019; --raised: #331622;
      --rose: #fb2e63; --rose-light: #ff5c8a; --amber: #f5872e;
      --text: #fbf6f8; --text-dim: #c9a9b4; --border: rgba(251, 46, 99, 0.18);
      --ok: #27cf8a; --warn: #f5a623;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: var(--bg); color: var(--text); padding: 24px; line-height: 1.45;
    }
    header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
    h1 { font-size: 22px; margin: 0; }
    h1 span { color: var(--rose); }
    .controls { display: flex; gap: 10px; align-items: center; }
    button {
      font: inherit; border: 1px solid var(--border); background: var(--raised); color: var(--text);
      padding: 8px 14px; border-radius: 10px; cursor: pointer; font-weight: 600;
    }
    button:hover { border-color: var(--rose); }
    button.primary { background: var(--rose); border-color: var(--rose); color: #fff; }
    button.danger { background: transparent; border-color: var(--rose); color: var(--rose-light); }
    button.ghost { background: transparent; }
    button:disabled { opacity: 0.5; cursor: default; }
    #status { color: var(--text-dim); font-size: 14px; }
    #banner { background: var(--card); border: 1px solid var(--warn); border-radius: 12px; padding: 16px; margin-bottom: 16px; display: none; }
    .report {
      background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 16px; margin-bottom: 14px;
    }
    .report.reviewed { opacity: 0.55; }
    .report-top { display: flex; gap: 16px; }
    .photos { display: flex; gap: 8px; flex-shrink: 0; }
    .photos img { width: 72px; height: 96px; object-fit: cover; border-radius: 10px; background: var(--raised); }
    .no-photo { width: 72px; height: 96px; border-radius: 10px; background: var(--raised); display: grid; place-items: center; color: var(--text-dim); font-size: 11px; }
    .meta { flex: 1; min-width: 0; }
    .name { font-size: 17px; font-weight: 700; }
    .pill { display: inline-block; font-size: 12px; font-weight: 700; padding: 2px 10px; border-radius: 999px; margin-left: 8px; }
    .pill.reason { background: rgba(245, 135, 46, 0.18); color: var(--amber); }
    .pill.banned { background: rgba(251, 46, 99, 0.2); color: var(--rose-light); }
    .pill.done { background: rgba(39, 207, 138, 0.18); color: var(--ok); }
    .bio { color: var(--text-dim); font-size: 14px; margin: 8px 0; white-space: pre-wrap; }
    .desc { font-size: 14px; margin: 6px 0; }
    .sub { color: var(--text-dim); font-size: 12px; }
    .actions { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
    .empty { color: var(--text-dim); text-align: center; padding: 60px 0; }
  </style>
</head>
<body>
  <header>
    <h1>Harvest <span>Moderation</span></h1>
    <div class="controls">
      <span id="status">Loading…</span>
      <button id="toggle" class="ghost">Show all</button>
      <button id="refresh" class="primary">Refresh</button>
    </div>
  </header>

  <div id="banner"></div>
  <div id="list"></div>

  <script src="config.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
